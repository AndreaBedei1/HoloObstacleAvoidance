# YOLO visual detector - simulation-only.
#
# Without `ultralytics` installed, or before the local weights exist, the node
# starts in skeleton mode and publishes nothing. When enabling it against the
# HoloOcean bridge, start the bridge with relay_oracle_topic:='' so
# /perception/obstacles has a single publisher.
/yolo_obstacle_detector:
  ros__parameters:
    image_topic: "/camera/front/image_raw"
    output_topic: "/perception/obstacles"
    frame_id: "front_camera"
    # Fine-tuned custom-object weights generated by training/yolo_custom_objects.
    model_path: "training/yolo_custom_objects/runs/yolov8n_custom_underwater/weights/best.pt"
    device: "cpu"
    confidence_threshold: 0.25
    target_classes: ["anchor", "mine", "torpedo"]
    class_map: ""
    horizontal_fov_deg: 90.0
    risk_area_gain: 4.0
    inference_stride: 1
