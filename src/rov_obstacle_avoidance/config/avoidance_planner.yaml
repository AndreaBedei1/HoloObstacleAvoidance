/local_avoidance_planner:
  ros__parameters:
    obstacle_topic: "/perception/obstacles"
    nominal_cmd_topic: "/cmd_vel_nominal"
    safe_cmd_topic: "/planner/cmd_vel_safe"
    debug_topic: "/avoidance/debug"
    # Estimated odometry (dead-reckoned DVL+gyro), NOT simulator ground truth.
    pose_topic: "/rov/odom_estimated"
    debug_frame_id: "front_camera"
    risk_enter_threshold: 0.55
    risk_exit_threshold: 0.30
    central_zone_min_x: 0.35
    central_zone_max_x: 0.65
    min_avoidance_hold_s: 1.0
    recovery_time_s: 2.0
    max_surge: 0.5
    min_surge_during_avoidance: 0.08
    avoidance_sway: 0.20
    # Limited yaw drift: avoidance is primarily lateral (sway); any residual
    # heading drift is nulled by the pose-aware recovery/line-keeping below.
    avoidance_yaw_rate: 0.1
    command_timeout_s: 1.0
    nominal_timeout_behavior: "stop"
    # Pose-aware recovery + line-keeping: return to and hold the ORIGINAL path
    # (position + heading), not merely body-frame forward motion.
    recovery_lateral_gain: 0.8
    recovery_yaw_gain: 1.0
    recovery_max_sway: 0.25
    recovery_max_yaw_rate: 0.30
    recovery_lateral_tolerance_m: 0.20
    recovery_yaw_tolerance_deg: 5.0
    recovery_max_time_s: 15.0
    forward_reference_min_surge: 0.02
    # Monocular range estimate (realistic: known target height + camera VFOV).
    camera_vertical_fov_deg: 90.0
    target_obstacle_height_m: 3.5
    max_range_m: 40.0
    # Committed circumnavigation: engage within this range, strafe to a clearing
    # offset, run parallel PAST the obstacle (odometry-gated), then return once.
    engage_distance_m: 9.0
    clearance_offset_m: 2.5
    pass_margin_m: 4.0
    go_around_surge: 0.4
    go_around_max_sway: 0.3
    offset_reached_tol_m: 0.4
    ahead_bearing_deg: 55.0
    planner_rate_hz: 20.0
